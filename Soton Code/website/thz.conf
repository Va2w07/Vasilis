<VirtualHost *:80>
        ServerName thz.localhost
        ServerAlias thz.*

        WSGIDaemonProcess thz_db user=www-data group=www-data processes=1 threads=15
        WSGIScriptAlias / /var/www/thz_db/app.wsgi

        DocumentRoot /var/www/thz_db

        <Directory /var/www/thz_db/>
                WSGIProcessGroup thz_db
                WSGIApplicationGroup %{GLOBAL}
                Order deny,allow
                Allow from all
        </Directory>

        Alias /js/ /var/www/thz_db/js/
        <Directory /usr/local/www/thz_db/js/>
                Order allow,deny
                Allow from all
        </Directory>

        Alias /css/ /var/www/thz_db/css/
        <Directory /usr/local/www/thz_db/css/>
                Order allow,deny
                Allow from all
        </Directory>

        Alias /flot/ /var/www/thz_db/flot/
        <Directory /usr/local/www/thz_db/flot/>
                Order allow,deny
                Allow from all
        </Directory>

        Alias /jquery/ /var/www/thz_db/jquery/
        <Directory /usr/local/www/thz_db/jquery/>
                Order allow,deny
                Allow from all
        </Directory>

        ErrorLog ${APACHE_LOG_DIR}/thz.error.log
        CustomLog ${APACHE_LOG_DIR}/thz.access.log combined

</VirtualHost>

